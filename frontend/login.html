<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MyGuru AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0F2548;--accent:#C8891A;--white:#fff;
  --paper:#FAFAF7;--ink:#0C1421;--muted:#5A6175;
  --border:#E3E5EE;--error:#9B2335;--success:#0A7C6A;
  --font:"Plus Jakarta Sans",sans-serif;
  --tamil:"Noto Sans Tamil","Plus Jakarta Sans",sans-serif;
}
body{font-family:var(--font);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:#fff;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-name{font-size:1.2rem;font-weight:700;color:var(--navy);}
.logo-name span{color:var(--accent);}
.nav-link{font-size:.875rem;color:var(--muted);text-decoration:none;}
.nav-link:hover{color:var(--navy);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(15,37,72,.08);}
.card-icon{width:56px;height:56px;background:rgba(15,37,72,.06);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.5rem;}
.card-title{font-size:1.5rem;font-weight:700;color:var(--ink);text-align:center;margin-bottom:.5rem;}
.card-sub{font-size:.875rem;color:var(--muted);text-align:center;line-height:1.65;margin-bottom:2rem;font-family:var(--tamil);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.8125rem;font-weight:600;color:var(--ink);margin-bottom:.5rem;}
input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:.9375rem;font-family:var(--font);color:var(--ink);outline:none;transition:border-color .15s;background:#fff;}
input:focus{border-color:var(--navy);}
input.error{border-color:var(--error);}
.error-msg{font-size:.75rem;color:var(--error);margin-top:.375rem;display:none;}
.error-msg.show{display:block;}
.btn{width:100%;padding:14px;border-radius:12px;font-size:.9375rem;font-weight:700;font-family:var(--font);border:none;cursor:pointer;transition:all .15s;margin-top:.5rem;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#163560;transform:translateY(-1px);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.otp-grid{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem;}
.otp-input{width:48px;height:56px;text-align:center;font-size:1.25rem;font-weight:700;border:1.5px solid var(--border);border-radius:10px;outline:none;transition:border-color .15s;font-family:var(--font);}
.otp-input:focus{border-color:var(--navy);}
.step{display:none;}
.step.active{display:block;}
.status-box{border-radius:10px;padding:10px 14px;font-size:.8125rem;margin-bottom:1rem;display:none;line-height:1.55;}
.status-box.show{display:block;}
.status-box.success{background:#E2F5F1;color:var(--success);}
.status-box.error{background:#FBEBEE;color:var(--error);}
.resend-row{text-align:center;margin-top:1rem;font-size:.8125rem;color:var(--muted);}
.resend-btn{background:none;border:none;color:var(--navy);font-weight:600;cursor:pointer;font-size:.8125rem;font-family:var(--font);}
.resend-btn:disabled{color:var(--muted);cursor:not-allowed;}
.signup-row{text-align:center;margin-top:1.5rem;font-size:.8125rem;color:var(--muted);}
.signup-row a{color:var(--navy);font-weight:600;text-decoration:none;}
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.loading-screen.hidden{display:none;}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--navy);animation:pulse 1.2s ease infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
footer{text-align:center;padding:1rem;font-size:.75rem;color:var(--muted);}
@media(max-width:480px){
  nav{padding:14px 16px;}
  .card{padding:2rem 1.25rem;border-radius:16px;}
  .otp-input{width:42px;height:50px;}
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading-screen">
  <div style="font-size:1.5rem;font-weight:700;color:#0F2548;">MyGuru AI</div>
  <div class="loading-dot"></div>
</div>

<!-- NAV -->
<nav>
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#fff"/>
        <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">My<span>Guru</span> AI</span>
  </a>
  <a href="/signup" class="nav-link">New student? Sign up →</a>
</nav>

<main>
  <div class="card">

    <!-- STEP 1: EMAIL -->
    <div class="step active" id="step-email">
      <div class="card-icon">📧</div>
      <h1 class="card-title">Welcome back!</h1>
      <p class="card-sub tamil">உங்கள் email கொடுங்க — OTP அனுப்புகிறோம்</p>
      <div class="status-box" id="email-status"></div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="your@gmail.com"
          autocomplete="email" inputmode="email"/>
        <div class="error-msg" id="email-error">சரியான email கொடுங்க</div>
      </div>
      <button class="btn btn-primary" id="send-otp-btn" onclick="sendOTP()">
        OTP அனுப்புங்க →
      </button>
      <div class="signup-row">
        New student? <a href="/signup">Free-ஆ sign up பண்ணுங்க</a>
      </div>
    </div>

    <!-- STEP 2: OTP -->
    <div class="step" id="step-otp">
      <div class="card-icon">🔐</div>
      <h1 class="card-title">OTP Enter பண்ணுங்க</h1>
      <p class="card-sub tamil" id="otp-sent-to">உங்கள் email-க்கு 6-digit OTP அனுப்பினோம்</p>
      <div class="status-box" id="otp-status"></div>
      <div class="otp-grid">
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-0" onkeyup="otpKeyup(event,0)"/>
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-1" onkeyup="otpKeyup(event,1)"/>
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-2" onkeyup="otpKeyup(event,2)"/>
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-3" onkeyup="otpKeyup(event,3)"/>
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-4" onkeyup="otpKeyup(event,4)"/>
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp-5" onkeyup="otpKeyup(event,5)"/>
      </div>
      <button class="btn btn-primary" id="verify-otp-btn" onclick="verifyOTP()">
        Login பண்ணுங்க →
      </button>
      <div class="resend-row">
        OTP வரவில்லையா?
        <button class="resend-btn" id="resend-btn" onclick="resendOTP()">மீண்டும் அனுப்புங்க</button>
        <span id="resend-timer"></span>
      </div>
      <div class="signup-row">
        <a href="#" onclick="goBack()">← வேற email try பண்ணுங்க</a>
      </div>
    </div>

  </div>
</main>

<footer>© 2025 MyGuru AI · myguruai.in</footer>

<script>
// ── CONFIG — loaded from API server ──
let SUPABASE_URL = ""
let SUPABASE_ANON_KEY = ""
const API_URL = "http://localhost:3000"
let currentEmail = ""
let resendTimer = null

// ── LOAD CONFIG FROM SERVER ──
async function loadConfig() {
  try {
    const res = await fetch(API_URL + "/api/config")
    const config = await res.json()
    SUPABASE_URL = config.supabase_url
    SUPABASE_ANON_KEY = config.supabase_anon_key
  } catch (err) {
    console.error("Config load failed:", err)
  }
}

// ── SEND OTP ──
async function sendOTP() {
  const email = document.getElementById("email").value.trim()
  const emailError = document.getElementById("email-error")
  const btn = document.getElementById("send-otp-btn")

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailError.classList.add("show")
    document.getElementById("email").classList.add("error")
    return
  }
  emailError.classList.remove("show")
  document.getElementById("email").classList.remove("error")

  btn.disabled = true
  btn.innerHTML = "<span class=\"loader\"></span>அனுப்புகிறோம்..."

  try {
    const res = await fetch(SUPABASE_URL + "/auth/v1/otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ email, create_user: true })
    })

    if (res.ok || res.status === 204) {
      currentEmail = email
      document.getElementById("otp-sent-to").textContent =
        email + "-க்கு 6-digit OTP அனுப்பினோம்"
      showStep("step-otp")
      document.getElementById("otp-0").focus()
      startResendTimer()
    } else {
      const data = await res.json()
      showStatus("email-status", data.error_description || "Error sending OTP. Try again.", "error")
    }
  } catch (err) {
    showStatus("email-status", "Network error. Is the server running?", "error")
  }

  btn.disabled = false
  btn.innerHTML = "OTP அனுப்புங்க →"
}

// ── VERIFY OTP ──
async function verifyOTP() {
  const otp = Array.from({length:6}, (_,i) =>
    document.getElementById("otp-" + i).value).join("")

  if (otp.length !== 6) {
    showStatus("otp-status", "6-digit OTP enter பண்ணுங்க", "error")
    return
  }

  const btn = document.getElementById("verify-otp-btn")
  btn.disabled = true
  btn.innerHTML = "<span class=\"loader\"></span>Verifying..."

  try {
    const res = await fetch(SUPABASE_URL + "/auth/v1/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ email: currentEmail, token: otp, type: "email" })
    })

    const data = await res.json()

    if (data.access_token) {
      localStorage.setItem("mg_token", data.access_token)
      localStorage.setItem("mg_refresh", data.refresh_token)
      localStorage.setItem("mg_user", JSON.stringify(data.user))
      showStatus("otp-status", "Login successful! Redirecting...", "success")
      setTimeout(() => { window.location.href = "/app" }, 1000)
    } else {
      showStatus("otp-status", "தவறான OTP. மீண்டும் try பண்ணுங்க.", "error")
    }
  } catch (err) {
    showStatus("otp-status", "Network error. Please try again.", "error")
  }

  btn.disabled = false
  btn.innerHTML = "Login பண்ணுங்க →"
}

// ── RESEND ──
async function resendOTP() {
  document.getElementById("resend-btn").disabled = true
  await fetch(SUPABASE_URL + "/auth/v1/otp", {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
    body: JSON.stringify({ email: currentEmail, create_user: true })
  })
  showStatus("otp-status", "New OTP sent!", "success")
  startResendTimer()
}

// ── OTP KEYBOARD ──
function otpKeyup(e, index) {
  const input = document.getElementById("otp-" + index)
  input.value = input.value.replace(/[^0-9]/g, "")
  if (input.value && index < 5) document.getElementById("otp-" + (index + 1)).focus()
  if (e.key === "Backspace" && !input.value && index > 0) document.getElementById("otp-" + (index - 1)).focus()
  const otp = Array.from({length:6}, (_,i) => document.getElementById("otp-" + i).value).join("")
  if (otp.length === 6) verifyOTP()
}

// ── RESEND TIMER ──
function startResendTimer() {
  let seconds = 30
  const timerEl = document.getElementById("resend-timer")
  const resendBtn = document.getElementById("resend-btn")
  resendBtn.disabled = true
  if (resendTimer) clearInterval(resendTimer)
  resendTimer = setInterval(() => {
    timerEl.textContent = " (" + seconds + "s)"
    seconds--
    if (seconds < 0) {
      clearInterval(resendTimer)
      timerEl.textContent = ""
      resendBtn.disabled = false
    }
  }, 1000)
}

// ── HELPERS ──
function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

function showStatus(id, msg, type) {
  const el = document.getElementById(id)
  el.textContent = msg
  el.className = "status-box show " + type
}

function goBack() {
  showStep("step-email")
  Array.from({length:6}, (_,i) => { document.getElementById("otp-" + i).value = "" })
}

// ── INIT ──
window.addEventListener("load", async () => {
  await loadConfig()
  document.getElementById("loading-screen").classList.add("hidden")
  const token = localStorage.getItem("mg_token")
  if (token) window.location.href = "/app"
})

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("email").addEventListener("keydown", e => {
    if (e.key === "Enter") sendOTP()
  })
})
</script>
</body>
</html>
